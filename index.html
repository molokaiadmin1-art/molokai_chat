<!DOCTYPE html>
<html>
<head>
    <title>Simple Tab Test</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; background: #f4f4f4; }
        #sidebar { width: 220px; background: #2c3e50; height: 100vh; padding: 20px; color: white; }
        .tab-button { 
            width: 100%; padding: 12px; margin-bottom: 8px; 
            background: #34495e; color: white; border: none; 
            border-radius: 4px; cursor: pointer; text-align: left;
        }
        .tab-button:hover { background: #1abc9c; }
        #main-content { flex-grow: 1; padding: 40px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="font-size: 18px; opacity: 0.8;">MY FORUMS</h2>
        <div id="button-container">Loading tabs...</div>
    </div>

    <div id="main-content">
        <h1 id="view-title">Welcome</h1>
        <p>Click a tab on the left to switch views.</p>
    </div>

<script>
    // PASTE YOUR NEW SCRIPT URL HERE
    const API_URL = "YOUR_SCRIPT_URL_HERE"; 

    async function init() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const container = document.getElementById('button-container');
            container.innerHTML = ""; // Clear loader

            data.folders.forEach(tabName => {
                const btn = document.createElement('button');
                btn.className = 'tab-button';
                btn.innerText = "📁 " + tabName;
                btn.onclick = () => {
                    document.getElementById('view-title').innerText = tabName;
                };
                container.appendChild(btn);
            });
        } catch (err) {
            document.getElementById('button-container').innerText = "Connection Error";
        }
    }

    init();
</script>
</body>
</html>
