

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub - Threaded Edition</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --admin-green: #27ae60; --sidebar-dark: #2c3e50; --aqi-good: #2ecc71; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Layout */
        #sidebar { width: 280px; background: var(--sidebar-dark); color: white; display: flex; flex-direction: column; padding: 20px; }
        #main-content { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }
        
        /* Message Styling */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .comment { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; max-width: 80%; }
        .reply-hint { border-left: 3px solid var(--admin-green) !important; background: #f1f8f4; margin-left: 30px !important; }
        
        /* Input Area */
        #input-area { padding: 20px; border-top: 1px solid #eee; background: white; display: flex; gap: 10px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: var(--admin-green); color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        .reply-indicator { font-size: 0.8em; color: var(--admin-green); margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 id="hub-title">Loading...</h2>
    <p id="hub-subtitle" style="font-size: 0.9em; opacity: 0.8;"></p>
    <hr style="width:100%; border:0; border-top:1px solid #555; margin: 20px 0;">
    
    <div id="sensor-box">
        <h4>Environmental Data</h4>
        <div id="sensor-list"></div>
    </div>

    <nav style="margin-top: auto;">
        <button onclick="showHome()" style="width:100%; margin-bottom:10px; background:#34495e;">
            <i class="fas fa-home"></i> My Conversations
        </button>
        <select id="forum-picker" onchange="loadTopic(this.value)" style="width:100%;"></select>
    </nav>
</div>

<div id="main-content">
    <div style="padding: 15px 25px; border-bottom: 1px solid #eee;">
        <h3 id="topic-title">Select a Forum</h3>
    </div>

    <div id="chat-container">
        <div id="personal-feed"></div>
    </div>

    <div id="input-area">
        <div style="display:flex; flex-direction:column; flex:1;">
            <div id="reply-to-label" class="reply-indicator"></div>
            <input type="text" id="user-name" placeholder="Your Name" style="width: 150px; margin-bottom:5px;">
            <input type="text" id="user-input" placeholder="Write a message..." onkeypress="if(event.key==='Enter') postMessage()">
        </div>
        <button onclick="postMessage()"><i class="fas fa-paper-plane"></i></button>
        <button id="cancel-reply-btn" onclick="cancelReply()" style="background:#e74c3c; display:none;">Cancel</button>
    </div>
</div>

<script>
    let forumData = {};
    let currentTopic = "";
    let activeParentID = ""; // Capitalized to match Sheet Column

    async function syncWithSheet() {
        try {
            const resp = await fetch(WEB_APP_URL);
            const data = await resp.json();
            
            // Admin-controlled labels [cite: 1, 11]
            document.getElementById('hub-title').innerText = data.settings["Hub Title"] || "Community Hub";
            document.getElementById('hub-subtitle').innerText = data.settings["Subtitle"] || "";
            
            // Sensor List
            const sList = document.getElementById('sensor-list');
            sList.innerHTML = data.sensors.map(s => 
                `<div style="font-size:0.9em; margin-bottom:5px;">${s.name}: <b>${s.value}</b></div>`
            ).join('');

            // Forum Picker
            const picker = document.getElementById('forum-picker');
            const forums = data.settings["Forums"].split(',');
            if (picker.options.length === 0) {
                forums.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.trim();
                    opt.innerText = f.trim();
                    picker.appendChild(opt);
                });
            }

            forumData = data.messages;
            if (currentTopic === "home") showHome();
            else if (currentTopic) loadTopic(currentTopic);
            else loadTopic(forums[0].trim());

        } catch (e) { console.error("Sync error:", e); }
    }

    function renderMessage(msg, container, isReply = false) {
        const div = document.createElement('div');
        div.className = isReply ? 'comment reply-hint' : 'comment';
        
        div.innerHTML = `
            <div style="font-size: 0.8em; color: #666; margin-bottom:4px;"><b>${msg.user}</b></div>
            <div>${msg.text}</div>
            ${!isReply ? `<button onclick="setReply('${msg.PostID}', '${msg.user}')" style="background:none; border:none; color:#2980b9; cursor:pointer; font-size:0.75em; padding:5px 0 0 0;">Reply</button>` : ''}
        `;
        container.appendChild(div);
    }

    function setReply(postId, userName) {
        activeParentID = postId; // Set ParentID for threading
        document.getElementById('reply-to-label').innerText = "Replying to " + userName;
        document.getElementById('reply-to-label').style.display = "block";
        document.getElementById('cancel-reply-btn').style.display = "block";
        document.getElementById('user-input').focus();
    }

    function cancelReply() {
        activeParentID = "";
        document.getElementById('reply-to-label').style.display = "none";
        document.getElementById('cancel-reply-btn').style.display = "none";
        document.getElementById('user-input').placeholder = "Write a message...";
    }

    function loadTopic(topicId) {
        currentTopic = topicId;
        document.getElementById('topic-title').innerText = topicId;
        const container = document.getElementById('chat-container');
        container.innerHTML = "";
        
        if (!forumData[topicId]) return;

        // Threading Logic
        const topLevel = forumData[topicId].filter(m => !m.ParentID);
        topLevel.forEach(parent => {
            renderMessage(parent, container);
            const replies = forumData[topicId].filter(r => r.ParentID === parent.PostID);
            replies.forEach(r => renderMessage(r, container, true));
        });
    }

    function showHome() {
        currentTopic = "home";
        const myName = document.getElementById('user-name').value || localStorage.getItem('user_name');
        document.getElementById('topic-title').innerText = "Kaʻu mau Kūkākūkā";
        const container = document.getElementById('chat-container');
        container.innerHTML = "";

        let myThreadIDs = [];
        Object.keys(forumData).forEach(fId => {
            forumData[fId].forEach(m => {
                if(m.user === myName) {
                    if(m.ParentID) myThreadIDs.push(m.ParentID);
                    myThreadIDs.push(m.PostID);
                }
            });
        });

        Object.keys(forumData).forEach(fId => {
            const topLevel = forumData[fId].filter(m => !m.ParentID);
            topLevel.forEach(parent => {
                const threadReplies = forumData[fId].filter(r => r.ParentID === parent.PostID);
                const involved = myThreadIDs.includes(parent.PostID) || threadReplies.some(r => myThreadIDs.includes(r.PostID));
                
                if(involved) {
                    renderMessage(parent, container);
                    threadReplies.forEach(r => renderMessage(r, container, true));
                }
            });
        });
    }

    async function postMessage() {
        const name = document.getElementById('user-name').value;
        const input = document.getElementById('user-input');
        const forum = document.getElementById('forum-picker').value;
        if (!name || !input.value.trim()) return;

        localStorage.setItem('user_name', name);
        const payload = { 
            name: name, 
            message: input.value, 
            forum: forum, 
            ParentID: activeParentID // Matches new capitalized Column E
        };

        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            input.value = "";
            cancelReply();
            syncWithSheet();
        } catch (e) { console.error("Post failed", e); }
    }

    setInterval(syncWithSheet, 10000); // Auto-sync every 10s
    document.addEventListener('DOMContentLoaded', syncWithSheet);
</script>
</body>
</html>
