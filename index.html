


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molokai Hub</title>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
        #main { flex: 1; padding: 20px; overflow-y: auto; background: #ecf0f1; }
        .msg { background: white; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #27ae60; }
        .reply { margin-left: 30px; border-left: 5px solid #3498db; }
        button { cursor: pointer; background: #27ae60; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
        .reply-btn { background: none; color: #3498db; text-decoration: underline; padding: 0; margin-top: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 id="title">Loading...</h2>
    <div id="forums"></div>
    <button onclick="showHome()" style="margin-top:20px; background:#34495e;">My Conversations</button>
</div>

<div id="main">
    <h3 id="view-title">Select a Forum</h3>
    <div id="content"></div>
    <hr>
    <div id="input-area">
        <p id="reply-to-text" style="display:none; color:#3498db; font-size:0.8em;"></p>
        <input type="text" id="user-name" placeholder="Your Name"><br><br>
        <textarea id="user-msg" placeholder="Message..." style="width:90%"></textarea><br>
        <button onclick="sendMsg()">Send Message</button>
        <button onclick="cancelReply()" id="cancel-btn" style="display:none; background:#e74c3c;">Cancel Reply</button>
    </div>
</div>

<script>
    let db = {};
    let currentForum = "";
    let activeParentId = ""; // Matches the lowercase 'parentId' in your data

    async function loadData() {
        try {
            const r = await fetch(WEB_APP_URL);
            const data = await r.json();
            db = data;

            // Set Title from Settings
            document.getElementById('title').innerText = data.settings.hub_title || "Molokai Hub";
            
            // Build Forum Buttons
            const forumDiv = document.getElementById('forums');
            forumDiv.innerHTML = "";
            const list = data.settings.forum_list.split(',');
            list.forEach(f => {
                const b = document.createElement('button');
                b.innerText = f.trim();
                b.style.display = "block";
                b.style.width = "100%";
                b.style.marginBottom = "5px";
                b.onclick = () => showForum(f.trim());
                forumDiv.appendChild(b);
            });

            if(currentForum) showForum(currentForum);
        } catch (e) { console.error("Error loading data", e); }
    }

    function showForum(f) {
        currentForum = f;
        document.getElementById('view-title').innerText = "Forum: " + f;
        const cont = document.getElementById('content');
        cont.innerHTML = "";
        
        const msgs = db.messages[f] || [];
        
        // Find top-level messages (no parentId)
        const parents = msgs.filter(m => !m.parentId);
        parents.forEach(p => {
            render(p, cont, false);
            // Find replies to this parent
            msgs.filter(r => r.parentId === p.postId).forEach(reply => {
                render(reply, cont, true);
            });
        });
    }

    function render(m, area, isReply) {
        const d = document.createElement('div');
        d.className = isReply ? "msg reply" : "msg";
        d.innerHTML = `<b>${m.user}</b>: ${m.text}<br>`;
        
        if(!isReply) {
            const btn = document.createElement('button');
            btn.className = "reply-btn";
            btn.innerText = "Reply";
            btn.onclick = () => {
                activeParentId = m.postId;
                document.getElementById('reply-to-text').innerText = "Replying to " + m.user;
                document.getElementById('reply-to-text').style.display = "block";
                document.getElementById('cancel-btn').style.display = "inline";
                document.getElementById('user-msg').focus();
            };
            d.appendChild(btn);
        }
        area.appendChild(d);
    }

    function cancelReply() {
        activeParentId = "";
        document.getElementById('reply-to-text').style.display = "none";
        document.getElementById('cancel-btn').style.display = "none";
    }

    async function sendMsg() {
        const u = document.getElementById('user-name').value;
        const t = document.getElementById('user-msg').value;
        if(!u || !t || !currentForum) return alert("Missing name, message, or forum selection");

        const payload = {
            name: u,
            message: t,
            forum: currentForum,
            parentId: activeParentId
        };

        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('user-msg').value = "";
        cancelReply();
        loadData();
    }

    function showHome() {
        // Simple placeholder for your Phase 4 "Memory" feature
        const myName = document.getElementById('user-name').value;
        if(!myName) return alert("Enter your name first to see your conversations");
        document.getElementById('view-title').innerText = "My Conversations";
        document.getElementById('content').innerHTML = "<p>Filtering threads for: " + myName + "</p>";
    }

    loadData();
    setInterval(loadData, 15000);
</script>

</body>
</html>
